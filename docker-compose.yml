version: "3.9"

services:
  # ── Backend ─────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: portfolio-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - CLIENT_URL=http://localhost:3000
    volumes:
      # Mount Docker socket so server can manage sandbox containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Resume PDF
      - ./server/public:/app/public
    depends_on: []
    networks:
      - portfolio-net

  # ── Frontend ─────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: portfolio-client
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SERVER_URL=http://localhost:5000
    depends_on:
      - server
    networks:
      - portfolio-net

networks:
  portfolio-net:
    driver: bridge
