name: Build & Deploy to K3s

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/0x1luffy

jobs:
  build-and-push:
    name: Build Docker images
    runs-on: ubuntu-latest        # ubuntu-latest is linux/amd64 — matches your OCI VM
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          platforms: linux/amd64      # ← explicitly target your OCI VM's arch
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/portfolio-server:latest
            ${{ env.IMAGE_PREFIX }}/portfolio-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          platforms: linux/amd64      # ← explicitly target your OCI VM's arch
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/portfolio-client:latest
            ${{ env.IMAGE_PREFIX }}/portfolio-client:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SERVER_URL=https://chetancodes.dpdns.org
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to K3s
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.OCI_VM_IP }}
          username: ${{ secrets.OCI_VM_USER }}
          key:      ${{ secrets.OCI_SSH_KEY }}
          script: |
            sudo k3s kubectl rollout restart deployment/portfolio-server -n portfolio
            sudo k3s kubectl rollout restart deployment/portfolio-client -n portfolio
            sudo k3s kubectl rollout status deployment/portfolio-server -n portfolio --timeout=120s
            sudo k3s kubectl rollout status deployment/portfolio-client -n portfolio --timeout=120s
            echo "✅ Deploy complete"
