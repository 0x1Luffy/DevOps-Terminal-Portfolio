# K3s ships with Traefik as the default ingress controller.
# This Ingress routes all traffic through a single domain:
#
#   https://chetancodes.dpdns.org/          → portfolio-client (Next.js)
#   https://chetancodes.dpdns.org/api/      → portfolio-server (Express)
#   https://chetancodes.dpdns.org/socket.io → portfolio-server (Socket.IO WS)
#
# TLS is handled by cert-manager (Let's Encrypt).
# Install cert-manager FIRST — see README-K3S.md step 3.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portfolio-ingress
  namespace: portfolio
  annotations:
    # cert-manager issues the TLS certificate
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Tell Traefik to redirect HTTP → HTTPS
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
    traefik.ingress.kubernetes.io/router.tls: "true"
    # Sticky sessions for Socket.IO (WebSocket needs same pod)
    traefik.ingress.kubernetes.io/service.sticky.cookie: "true"
    traefik.ingress.kubernetes.io/service.sticky.cookie.name: "portfolio_sticky"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - chetancodes.dpdns.org
      secretName: portfolio-tls   # cert-manager auto-populates this
  rules:
    - host: chetancodes.dpdns.org
      http:
        paths:
          # Socket.IO — must come BEFORE /api to match /socket.io path
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: portfolio-server
                port:
                  number: 5000
          # Express API
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: portfolio-server
                port:
                  number: 5000
          # Everything else → Next.js frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: portfolio-client
                port:
                  number: 3000
